name: Release notify issues

on:
  release:
    types: [published]

jobs:
  comment-shipped:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Comment on shipped issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          set -euo pipefail

          PREV_TAG=$(git tag --sort=-v:refname | grep -v -- '-' | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous stable tag found; skipping."
            exit 0
          fi
          echo "Scanning $PREV_TAG..$TAG for closed-issue references"

          NUMS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"%s %b" \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u)

          if [ -z "$NUMS" ]; then
            echo "No issue references found."
            exit 0
          fi

          for N in $NUMS; do
            DATA=$(gh api "repos/${REPO}/issues/${N}" --jq '{pr: (.pull_request != null), state: .state}' 2>/dev/null || echo '{}')
            IS_PR=$(echo "$DATA" | jq -r '.pr // false')
            STATE=$(echo "$DATA" | jq -r '.state // ""')

            if [ "$IS_PR" = "true" ]; then
              echo "#${N}: pull request, skip"
              continue
            fi
            if [ "$STATE" != "closed" ]; then
              echo "#${N}: state=${STATE}, skip"
              continue
            fi

            echo "#${N}: commenting"
            gh issue comment "$N" --repo "$REPO" \
              --body "Shipped in [${TAG}](${RELEASE_URL}) 🚀"
          done
