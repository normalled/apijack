name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    # Skip on PRs that don't touch testable surface area. Pushes to main / dev
    # always run (above) so the branch heads stay verified.
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lockb'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint

  unit-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
