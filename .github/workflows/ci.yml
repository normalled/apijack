name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  codegen-bun-api:
    name: "Codegen: Bun Task Manager API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Start example server
        run: bun run examples/bun-api/server.ts &
      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3456/v3/api-docs > /dev/null && break
            sleep 1
          done
      - name: Fetch spec and generate
        run: |
          mkdir -p /tmp/generated
          curl -s -u admin:password http://localhost:3456/v3/api-docs -o /tmp/spec.json
          bun -e "
            const { generate } = require('./src/codegen/index.ts');
            const spec = require('/tmp/spec.json');
            generate({ spec, outDir: '/tmp/generated' });
          "
      - name: Verify generated files exist
        run: |
          test -f /tmp/generated/types.ts
          test -f /tmp/generated/client.ts
          test -f /tmp/generated/commands.ts
          test -f /tmp/generated/command-map.ts
          echo "All 4 files generated"
      - name: Verify generated code compiles
        run: bun build /tmp/generated/client.ts --no-bundle --outdir /tmp/compiled 2>&1

  codegen-python-api:
    name: "Codegen: Python Bookstore API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bun install
      - name: Install Python deps
        run: pip install -r examples/python-api/requirements.txt
      - name: Start example server
        run: python examples/python-api/main.py &
      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:3457/v3/api-docs > /dev/null && break
            sleep 1
          done
      - name: Fetch spec and generate
        run: |
          mkdir -p /tmp/generated
          curl -s -u admin:password http://localhost:3457/v3/api-docs -o /tmp/spec.json
          bun -e "
            const { generate } = require('./src/codegen/index.ts');
            const spec = require('/tmp/spec.json');
            generate({ spec, outDir: '/tmp/generated' });
          "
      - name: Verify generated files exist
        run: |
          test -f /tmp/generated/types.ts
          test -f /tmp/generated/client.ts
          test -f /tmp/generated/commands.ts
          test -f /tmp/generated/command-map.ts
          echo "All 4 files generated"
      - name: Verify generated code compiles
        run: bun build /tmp/generated/client.ts --no-bundle --outdir /tmp/compiled 2>&1

  codegen-edge-cases:
    name: "Codegen: Edge Cases Stress Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Start example server
        run: bun run examples/edge-cases-api/server.ts &
      - name: Wait for server
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:3458/v3/api-docs > /dev/null && break
            sleep 1
          done
      - name: Fetch spec and generate
        run: |
          mkdir -p /tmp/generated
          curl -s -u admin:password http://localhost:3458/v3/api-docs -o /tmp/spec.json
          bun -e "
            const { generate } = require('./src/codegen/index.ts');
            const spec = require('/tmp/spec.json');
            generate({ spec, outDir: '/tmp/generated' });
          "
      - name: Verify generated files exist
        run: |
          test -f /tmp/generated/types.ts
          test -f /tmp/generated/client.ts
          test -f /tmp/generated/commands.ts
          test -f /tmp/generated/command-map.ts
          echo "All 4 files generated"
      - name: Verify generated code compiles
        run: bun build /tmp/generated/client.ts --no-bundle --outdir /tmp/compiled 2>&1
