name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    # Only publish when a version bump commit is in the push
    if: "contains(github.event.head_commit.message, 'chore(release):') || contains(toJSON(github.event.commits.*.message), 'chore(release):')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install

      # Test + lint + build
      - run: bun test
      - run: bun run lint
      - run: bun run build:plugin

      # Verify pack works
      - run: npm pack --dry-run

      # Create git tag from package.json version
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git tag -a "v$VERSION" -m "v$VERSION"
          git push --tags

      # Publish to npm via trusted publishing (OIDC — no token needed)
      - name: Publish to npm
        run: npm publish
