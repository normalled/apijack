name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip if this push was the version bump commit
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Test + lint + build
      - run: bun test
      - run: bun run lint
      - run: bun run build:plugin

      # Verify pack works
      - run: npm pack --dry-run

      # Determine version bump from commits since last tag
      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s%n%b")

          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            echo "level=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -q "^feat"; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      # Bump version in package.json + create git tag
      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.level }} -m "chore(release): v%s"

      # Publish to npm
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Push version bump commit + tag back to main
      - name: Push version bump
        run: git push --follow-tags
