name: review-issue
description: Review one open apijack PR (oldest first) — comment only, no merge

schedule: "*/15 * * * *"
enabled: true
auth: subscription

preflight:
  run: .claude/skills/review-issue/scripts/find-review-candidate.sh > /dev/null
  timeout: 30s

claude:
  prompt_cmd: |
    pr=$(.claude/skills/review-issue/scripts/find-review-candidate.sh)
    echo "/review-issue $pr"

  append_system_prompt: |
    You are running non-interactively. Your scope for this run is strictly
    review-and-comment: read the PR, post review feedback via `gh pr review`,
    then stop. Do NOT merge, do NOT push, do NOT hand off to other skills.
    If the skill suggests merging, skip that step and exit.

  allowed_tools:
    - "Bash(gh pr view*)"
    - "Bash(gh pr list*)"
    - "Bash(gh pr diff*)"
    - "Bash(gh pr checks*)"
    - "Bash(gh issue view*)"
    - "Bash(gh pr review*)"
    - "Bash(gh pr comment*)"
    - "Bash(.claude/skills/review-issue/scripts/set-review-label.sh*)"
    - "Bash(.claude/skills/review-issue/scripts/ensure-review-labels.sh*)"
    - "Bash(.claude/skills/review-issue/scripts/post-review.sh*)"
    # Write is allowed so the agent can produce the review-body file that
    # post-review.sh consumes (avoids the backtick-escaping artifact that
    # happens when markdown is shoved into `gh pr review --body "..."`).
    # Defense-in-depth: post-review.sh refuses any body path outside
    # .claude-jobs/review-bodies/.
    - "Write"
    - "Bash(git log*)"
    - "Bash(git show*)"
    - "Bash(git diff*)"
    - "Bash(git blame*)"
    - "Read"
    - "Grep"

  permission_mode: auto

cwd: "."
timeout: 10m

logging:
  retention_days: 30
