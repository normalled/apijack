<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f3f4;
      min-height: 100vh;
    }

    header {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 22px;
      font-weight: 500;
      color: #202124;
    }

    .count {
      font-size: 14px;
      color: #5f6368;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      padding: 24px;
    }

    .card {
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: #fff;
      min-height: 100px;
      display: flex;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      transition: background-color 0.3s ease;
    }

    .card.fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .card.pop {
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .card.fade-out {
      animation: fadeOut 0.3s ease forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); }
    }

    .status {
      position: fixed;
      bottom: 16px;
      right: 16px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: #fff;
      background: #323232;
    }

    .status.connected { background: #1b7e3e; }
    .status.disconnected { background: #c5221f; }
  </style>
</head>
<body>
  <header>
    <h1>TODOs</h1>
    <span class="count" id="count">0 items</span>
  </header>
  <div class="grid" id="grid"></div>
  <div class="status disconnected" id="status">Disconnected</div>

  <script>
    const grid = document.getElementById("grid");
    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");
    const todos = new Map();

    function textColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? "#202124" : "#ffffff";
    }

    function updateCount() {
      const n = todos.size;
      countEl.textContent = n + " item" + (n !== 1 ? "s" : "");
    }

    function addCard(todo) {
      todos.set(todo.id, todo);
      const card = document.createElement("div");
      card.className = "card fade-in";
      card.id = "todo-" + todo.id;
      card.textContent = todo.title;
      card.style.backgroundColor = todo.color;
      card.style.color = textColor(todo.color);
      grid.appendChild(card);
      card.addEventListener("animationend", () => card.classList.remove("fade-in"), { once: true });
      updateCount();
    }

    function updateCard(todo) {
      todos.set(todo.id, todo);
      const card = document.getElementById("todo-" + todo.id);
      if (!card) return;
      card.textContent = todo.title;
      card.style.backgroundColor = todo.color;
      card.style.color = textColor(todo.color);
      card.classList.remove("pop");
      void card.offsetWidth; // force reflow to restart animation
      card.classList.add("pop");
      card.addEventListener("animationend", () => card.classList.remove("pop"), { once: true });
    }

    function removeCard(id) {
      todos.delete(id);
      updateCount();
      const card = document.getElementById("todo-" + id);
      if (!card) return;
      card.classList.add("fade-out");
      card.addEventListener("animationend", () => card.remove(), { once: true });
    }

    function connect() {
      const ws = new WebSocket("ws://" + location.host + "/ws");
      ws.onopen = () => {
        statusEl.textContent = "Connected";
        statusEl.className = "status connected";
      };
      ws.onclose = () => {
        statusEl.textContent = "Disconnected";
        statusEl.className = "status disconnected";
        setTimeout(connect, 2000);
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.event === "todo:created") addCard(msg.todo);
        else if (msg.event === "todo:updated") updateCard(msg.todo);
        else if (msg.event === "todo:deleted") removeCard(msg.todo.id);
      };
    }

    // Hydrate existing TODOs on load
    fetch("/todos", {
      headers: { Authorization: "Basic " + btoa("admin:admin") },
    })
      .then((r) => r.json())
      .then((list) => list.forEach(addCard))
      .catch(() => {});

    connect();
  </script>
</body>
</html>
