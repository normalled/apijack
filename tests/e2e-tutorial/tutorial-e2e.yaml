name: tutorial-e2e
description: >
  End-to-end test of the full tutorial workflow:
  verify custom resolver ($_uppercase) round-trips via a TODO,
  create 50 TODOs, color each randomly in shuffled order,
  delete all in reverse creation order, verify empty.

variables:
  greeting: "hello-from-variable"

steps:
  - name: custom-resolver-literal
    command: todos create
    args:
      --title: "$_uppercase(hello-resolver)"
    output: literal
    assert: "$literal.title == HELLO-RESOLVER"

  - name: custom-resolver-ref
    command: todos create
    args:
      --title: "$_uppercase($greeting)"
    output: resolved
    assert: "$resolved.title == HELLO-FROM-VARIABLE"

  - name: custom-resolver-cleanup-literal
    command: todos delete
    args:
      --id: "$literal.id"

  - name: custom-resolver-cleanup-ref
    command: todos delete
    args:
      --id: "$resolved.id"

  - name: create-todos
    range: [1, 50]
    as: n
    steps:
      - name: create
        command: todos create
        args:
          --title: "Todo $n"

  - name: verify-created
    command: todos list
    output: all_todos
    assert: "$all_todos.length == 50"

  - name: color-todos
    forEach: "$all_todos"
    shuffle: true
    as: todo
    steps:
      - name: color
        command: todos patch
        args:
          --id: "$todo.id"
          --color: "$_random_hex_color"

  - name: delete-todos
    forEach: "$all_todos"
    reverse: true
    as: todo
    steps:
      - name: delete
        command: todos delete
        args:
          --id: "$todo.id"

  - name: verify-empty
    command: todos list
    output: final
    assert: "$final.length == 0"
